name: CI/CD

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build API
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/teladan_portfolio?schema=public
        run: npm run build:api

  deploy:
    name: Build Image and Deploy to EC2
    runs-on: ubuntu-latest
    needs: check
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    concurrency:
      group: portfolio-production
      cancel-in-progress: false
    environment: production
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}
      DOCKERHUB_API_REPOSITORY: ${{ secrets.DOCKERHUB_API_REPOSITORY }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_PORT: ${{ secrets.EC2_PORT }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
      EC2_SERVER_NAME: ${{ secrets.EC2_SERVER_NAME }}
      EC2_NGINX_CONF: ${{ secrets.EC2_NGINX_CONF }}
      EC2_BLUE_PORT: ${{ secrets.EC2_BLUE_PORT }}
      EC2_GREEN_PORT: ${{ secrets.EC2_GREEN_PORT }}
      EC2_API_PORT: ${{ secrets.EC2_API_PORT }}
      VITE_PORTFOLIO_CHAT_WEBHOOK_URL: ${{ secrets.VITE_PORTFOLIO_CHAT_WEBHOOK_URL }}
      PROD_POSTGRES_DB: ${{ secrets.PROD_POSTGRES_DB }}
      PROD_POSTGRES_USER: ${{ secrets.PROD_POSTGRES_USER }}
      PROD_POSTGRES_PASSWORD: ${{ secrets.PROD_POSTGRES_PASSWORD }}
      PROD_CORS_ORIGIN: ${{ secrets.PROD_CORS_ORIGIN }}
      PROD_COOKIE_SECRET: ${{ secrets.PROD_COOKIE_SECRET }}
      PROD_SESSION_SECRET: ${{ secrets.PROD_SESSION_SECRET }}
      PROD_ADMIN_EMAIL: ${{ secrets.PROD_ADMIN_EMAIL }}
      PROD_ADMIN_PASSWORD: ${{ secrets.PROD_ADMIN_PASSWORD }}
      PROD_SESSION_DAYS: ${{ secrets.PROD_SESSION_DAYS }}
      PROD_MAX_UPLOAD_MB: ${{ secrets.PROD_MAX_UPLOAD_MB }}
      PROD_PUBLIC_UPLOAD_BASE_URL: ${{ secrets.PROD_PUBLIC_UPLOAD_BASE_URL }}
      RUN_PROD_SEED: ${{ secrets.RUN_PROD_SEED }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          set -euo pipefail

          : "${DOCKERHUB_USERNAME:?Missing DOCKERHUB_USERNAME secret}"
          : "${DOCKERHUB_TOKEN:?Missing DOCKERHUB_TOKEN secret}"

          REPOSITORY="${DOCKERHUB_REPOSITORY:-personal-porto}"
          API_REPOSITORY="${DOCKERHUB_API_REPOSITORY:-personal-porto-api}"
          SHORT_SHA="${GITHUB_SHA::12}"
          IMAGE_NAME="$DOCKERHUB_USERNAME/$REPOSITORY"
          API_IMAGE_NAME="$DOCKERHUB_USERNAME/$API_REPOSITORY"

          echo "name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$IMAGE_NAME:sha-$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$IMAGE_NAME:latest" >> "$GITHUB_OUTPUT"
          echo "api_name=$API_IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "api_sha_tag=$API_IMAGE_NAME:sha-$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "api_latest_tag=$API_IMAGE_NAME:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.sha_tag }}
            ${{ steps.image.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_PORTFOLIO_CHAT_WEBHOOK_URL=${{ env.VITE_PORTFOLIO_CHAT_WEBHOOK_URL }}

      - name: Build and push API Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.api_sha_tag }}
            ${{ steps.image.outputs.api_latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail

          : "${EC2_HOST:?Missing EC2_HOST secret}"
          : "${EC2_USER:?Missing EC2_USER secret}"
          : "${EC2_SSH_KEY:?Missing EC2_SSH_KEY secret}"

          EC2_PORT="${EC2_PORT:-22}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -p "$EC2_PORT" -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Upload Compose files
        shell: bash
        run: |
          set -euo pipefail

          EC2_PORT="${EC2_PORT:-22}"
          REMOTE_APP_DIR="${EC2_APP_DIR:-/opt/teladan-porto}"

          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "sudo -n mkdir -p '$REMOTE_APP_DIR' && sudo -n chown '$EC2_USER:$EC2_USER' '$REMOTE_APP_DIR'"
          scp -i ~/.ssh/ec2_key -P "$EC2_PORT" deploy/compose.portfolio.yml "$EC2_USER@$EC2_HOST:$REMOTE_APP_DIR/compose.portfolio.yml"
          scp -i ~/.ssh/ec2_key -P "$EC2_PORT" deploy/compose.api.yml "$EC2_USER@$EC2_HOST:$REMOTE_APP_DIR/compose.api.yml"

      - name: Deploy blue-green slot
        shell: bash
        run: |
          set -euo pipefail

          EC2_PORT="${EC2_PORT:-22}"
          REMOTE_APP_DIR="${EC2_APP_DIR:-/opt/teladan-porto}"
          SERVER_NAME="${EC2_SERVER_NAME:-muelsm.site}"
          NGINX_CONF="${EC2_NGINX_CONF:-/etc/nginx/sites-available/muelsm.site}"
          BLUE_PORT="${EC2_BLUE_PORT:-8081}"
          GREEN_PORT="${EC2_GREEN_PORT:-8082}"
          API_PORT="${EC2_API_PORT:-3000}"
          IMAGE="${{ steps.image.outputs.sha_tag }}"
          API_IMAGE="${{ steps.image.outputs.api_sha_tag }}"
          POSTGRES_DB="${PROD_POSTGRES_DB:-teladan_portfolio}"
          POSTGRES_USER="${PROD_POSTGRES_USER:-teladan_portfolio}"
          POSTGRES_PASSWORD="${PROD_POSTGRES_PASSWORD:-}"
          CORS_ORIGIN="${PROD_CORS_ORIGIN:-https://$SERVER_NAME,https://www.$SERVER_NAME}"
          COOKIE_SECRET="${PROD_COOKIE_SECRET:-}"
          SESSION_SECRET="${PROD_SESSION_SECRET:-}"
          ADMIN_EMAIL="${PROD_ADMIN_EMAIL:-}"
          ADMIN_PASSWORD="${PROD_ADMIN_PASSWORD:-}"
          SESSION_DAYS="${PROD_SESSION_DAYS:-7}"
          MAX_UPLOAD_MB="${PROD_MAX_UPLOAD_MB:-25}"
          PUBLIC_UPLOAD_BASE_URL="${PROD_PUBLIC_UPLOAD_BASE_URL:-/uploads}"
          RUN_SEED="${RUN_PROD_SEED:-false}"

          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" bash -s -- \
            "$REMOTE_APP_DIR" \
            "$IMAGE" \
            "$API_IMAGE" \
            "$DOCKERHUB_USERNAME" \
            "$DOCKERHUB_TOKEN" \
            "$SERVER_NAME" \
            "$NGINX_CONF" \
            "$BLUE_PORT" \
            "$GREEN_PORT" \
            "$API_PORT" \
            "$POSTGRES_DB" \
            "$POSTGRES_USER" \
            "$POSTGRES_PASSWORD" \
            "$CORS_ORIGIN" \
            "$COOKIE_SECRET" \
            "$SESSION_SECRET" \
            "$ADMIN_EMAIL" \
            "$ADMIN_PASSWORD" \
            "$SESSION_DAYS" \
            "$MAX_UPLOAD_MB" \
            "$PUBLIC_UPLOAD_BASE_URL" \
            "$RUN_SEED" <<'REMOTE_SCRIPT'
          set -euo pipefail

          APP_DIR="$1"
          IMAGE="$2"
          API_IMAGE="$3"
          DOCKERHUB_USERNAME="$4"
          DOCKERHUB_TOKEN="$5"
          SERVER_NAME="$6"
          NGINX_CONF="$7"
          BLUE_PORT="$8"
          GREEN_PORT="$9"
          API_PORT="${10}"
          POSTGRES_DB="${11}"
          POSTGRES_USER="${12}"
          POSTGRES_PASSWORD="${13}"
          CORS_ORIGIN="${14}"
          COOKIE_SECRET="${15}"
          SESSION_SECRET="${16}"
          ADMIN_EMAIL="${17}"
          ADMIN_PASSWORD="${18}"
          SESSION_DAYS="${19}"
          MAX_UPLOAD_MB="${20}"
          PUBLIC_UPLOAD_BASE_URL="${21}"
          RUN_SEED="${22}"

          APP_NAME="teladan-porto"
          ACTIVE_SLOT_FILE="$APP_DIR/active_slot"
          COMPOSE_FILE="$APP_DIR/compose.portfolio.yml"
          API_COMPOSE_FILE="$APP_DIR/compose.api.yml"
          API_ENV_FILE="$APP_DIR/.env.api"

          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker is not installed on the EC2 instance."
            exit 1
          fi

          if ! docker compose version >/dev/null 2>&1; then
            echo "Docker Compose plugin is not installed on the EC2 instance."
            exit 1
          fi

          mkdir -p "$APP_DIR"
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

          echo "Docker disk usage before cleanup:"
          docker system df || true
          docker system prune -af || true
          docker builder prune -af || true
          echo "Docker disk usage after cleanup:"
          docker system df || true

          docker pull "$IMAGE"
          docker pull "$API_IMAGE"

          : "${POSTGRES_PASSWORD:?Missing production Postgres password}"
          : "${COOKIE_SECRET:?Missing production cookie secret}"
          : "${SESSION_SECRET:?Missing production session secret}"
          : "${ADMIN_EMAIL:?Missing production admin email}"
          : "${ADMIN_PASSWORD:?Missing production admin password}"

          cat > "$API_ENV_FILE" <<ENV
          API_IMAGE=$API_IMAGE
          API_CONTAINER_NAME=$APP_NAME-api
          API_PORT=$API_PORT
          POSTGRES_CONTAINER_NAME=$APP_NAME-postgres
          POSTGRES_DB=$POSTGRES_DB
          POSTGRES_USER=$POSTGRES_USER
          POSTGRES_PASSWORD=$POSTGRES_PASSWORD
          CORS_ORIGIN=$CORS_ORIGIN
          COOKIE_SECRET=$COOKIE_SECRET
          SESSION_SECRET=$SESSION_SECRET
          SESSION_DAYS=$SESSION_DAYS
          ADMIN_EMAIL=$ADMIN_EMAIL
          ADMIN_PASSWORD=$ADMIN_PASSWORD
          MAX_UPLOAD_MB=$MAX_UPLOAD_MB
          PUBLIC_UPLOAD_BASE_URL=$PUBLIC_UPLOAD_BASE_URL
          ENV

          docker compose --env-file "$API_ENV_FILE" -f "$API_COMPOSE_FILE" -p "$APP_NAME-api" up -d --remove-orphans

          for attempt in $(seq 1 40); do
            if curl -fsS "http://127.0.0.1:$API_PORT/api/health" >/dev/null; then
              break
            fi

            if [ "$attempt" -eq 40 ]; then
              echo "API stack failed health check."
              docker compose --env-file "$API_ENV_FILE" -f "$API_COMPOSE_FILE" -p "$APP_NAME-api" logs --tail=120
              exit 1
            fi

            sleep 2
          done

          docker compose --env-file "$API_ENV_FILE" -f "$API_COMPOSE_FILE" -p "$APP_NAME-api" exec -T api npm run prisma:deploy
          echo "API migrations applied."

          ACTIVE_SLOT="green"
          if [ -f "$ACTIVE_SLOT_FILE" ]; then
            ACTIVE_SLOT="$(cat "$ACTIVE_SLOT_FILE")"
          fi

          if [ "$ACTIVE_SLOT" = "blue" ]; then
            INACTIVE_SLOT="green"
            INACTIVE_PORT="$GREEN_PORT"
          else
            INACTIVE_SLOT="blue"
            INACTIVE_PORT="$BLUE_PORT"
          fi

          ENV_FILE="$APP_DIR/.env.$INACTIVE_SLOT"
          cat > "$ENV_FILE" <<ENV
          PORTFOLIO_IMAGE=$IMAGE
          PORTFOLIO_CONTAINER_NAME=$APP_NAME-$INACTIVE_SLOT
          PORTFOLIO_PORT=$INACTIVE_PORT
          ENV

          echo "Starting frontend slot: $INACTIVE_SLOT on port $INACTIVE_PORT"
          docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" -p "$APP_NAME-$INACTIVE_SLOT" up -d --remove-orphans --force-recreate

          for attempt in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:$INACTIVE_PORT/" >/dev/null; then
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              echo "New $INACTIVE_SLOT slot failed health check."
              docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" -p "$APP_NAME-$INACTIVE_SLOT" logs --tail=80
              exit 1
            fi

            sleep 2
          done

          PRIMARY_SERVER_NAME="${SERVER_NAME%% *}"
          SERVER_NAMES="$SERVER_NAME"
          if [ "$SERVER_NAME" = "$PRIMARY_SERVER_NAME" ] && [ "$PRIMARY_SERVER_NAME" != "_" ]; then
            SERVER_NAMES="$PRIMARY_SERVER_NAME www.$PRIMARY_SERVER_NAME"
          fi

          ACTIVE_NGINX_CONF="$NGINX_CONF"
          ENABLED_NGINX_CONF="/etc/nginx/sites-enabled/$PRIMARY_SERVER_NAME"
          if [ -e "$ENABLED_NGINX_CONF" ]; then
            if [ -L "$ENABLED_NGINX_CONF" ]; then
              ACTIVE_NGINX_CONF="$(readlink -f "$ENABLED_NGINX_CONF")"
            else
              ACTIVE_NGINX_CONF="$ENABLED_NGINX_CONF"
            fi
          fi
          echo "Writing active Nginx config: $ACTIVE_NGINX_CONF"

          CERT_DIR="/etc/letsencrypt/live/$PRIMARY_SERVER_NAME"
          SSL_OPTIONS="/etc/letsencrypt/options-ssl-nginx.conf"
          SSL_DHPARAM="/etc/letsencrypt/ssl-dhparams.pem"
          TMP_CONF="$APP_DIR/nginx.$INACTIVE_SLOT.conf"

          if [ "$PRIMARY_SERVER_NAME" != "_" ]; then
            INCLUDE_SSL_OPTIONS=""
            SSL_DHPARAM_LINE=""

            if [ -f "$SSL_OPTIONS" ]; then
              INCLUDE_SSL_OPTIONS="include $SSL_OPTIONS;"
            fi

            if [ -f "$SSL_DHPARAM" ]; then
              SSL_DHPARAM_LINE="ssl_dhparam $SSL_DHPARAM;"
            fi

            cat > "$TMP_CONF" <<NGINX
          server {
            listen 80;
            server_name $SERVER_NAMES;
            return 301 https://\$host\$request_uri;
          }

          server {
            listen 443 ssl;
            server_name $SERVER_NAMES;

            ssl_certificate $CERT_DIR/fullchain.pem;
            ssl_certificate_key $CERT_DIR/privkey.pem;
            $INCLUDE_SSL_OPTIONS
            $SSL_DHPARAM_LINE

            location /api/ {
              proxy_pass http://127.0.0.1:$API_PORT;
              proxy_http_version 1.1;
              proxy_set_header Host \$host;
              proxy_set_header X-Real-IP \$remote_addr;
              proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto \$scheme;
            }

            location /uploads/ {
              proxy_pass http://127.0.0.1:$API_PORT;
              proxy_http_version 1.1;
              proxy_set_header Host \$host;
              proxy_set_header X-Real-IP \$remote_addr;
              proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto \$scheme;
            }

            location / {
              proxy_pass http://127.0.0.1:$INACTIVE_PORT;
              proxy_http_version 1.1;
              proxy_set_header Host \$host;
              proxy_set_header X-Real-IP \$remote_addr;
              proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto \$scheme;
            }
          }
          NGINX
          else
            cat > "$TMP_CONF" <<NGINX
          server {
            listen 80;
            server_name $SERVER_NAMES;

            location /api/ {
              proxy_pass http://127.0.0.1:$API_PORT;
              proxy_http_version 1.1;
              proxy_set_header Host \$host;
              proxy_set_header X-Real-IP \$remote_addr;
              proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto \$scheme;
            }

            location /uploads/ {
              proxy_pass http://127.0.0.1:$API_PORT;
              proxy_http_version 1.1;
              proxy_set_header Host \$host;
              proxy_set_header X-Real-IP \$remote_addr;
              proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto \$scheme;
            }

            location / {
              proxy_pass http://127.0.0.1:$INACTIVE_PORT;
              proxy_http_version 1.1;
              proxy_set_header Host \$host;
              proxy_set_header X-Real-IP \$remote_addr;
              proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto \$scheme;
            }
          }
          NGINX
          fi

          if [ -f "$ACTIVE_NGINX_CONF" ]; then
            sudo -n cp "$ACTIVE_NGINX_CONF" "$APP_DIR/nginx.previous.conf"
          fi

          sudo -n mv "$TMP_CONF" "$ACTIVE_NGINX_CONF"

          if sudo -n nginx -t; then
            sudo -n systemctl reload nginx || sudo -n nginx -s reload
            echo "$INACTIVE_SLOT" > "$ACTIVE_SLOT_FILE"
          else
            echo "Nginx config test failed. Rolling back config."
            if [ -f "$APP_DIR/nginx.previous.conf" ]; then
              sudo -n cp "$APP_DIR/nginx.previous.conf" "$ACTIVE_NGINX_CONF"
              sudo -n nginx -t && (sudo -n systemctl reload nginx || sudo -n nginx -s reload)
            fi
            exit 1
          fi

          if docker compose --env-file "$API_ENV_FILE" -f "$API_COMPOSE_FILE" -p "$APP_NAME-api" exec -T api npm run admin:bootstrap; then
            echo "Admin user bootstrapped."
          else
            echo "Warning: admin bootstrap failed after frontend switch. Check API logs and ADMIN_EMAIL/ADMIN_PASSWORD secrets."
          fi

          NORMALIZED_RUN_SEED="$(printf '%s' "$RUN_SEED" | tr '[:upper:]' '[:lower:]')"
          if [ "$NORMALIZED_RUN_SEED" = "true" ] || [ "$NORMALIZED_RUN_SEED" = "1" ] || [ "$NORMALIZED_RUN_SEED" = "yes" ]; then
            docker compose --env-file "$API_ENV_FILE" -f "$API_COMPOSE_FILE" -p "$APP_NAME-api" exec -T api npm run seed
          fi

          echo "Active frontend slot: $INACTIVE_SLOT"
          echo "Active frontend image: $IMAGE"
          echo "API image: $API_IMAGE"

          docker system prune -af
          docker builder prune -af || true
          REMOTE_SCRIPT
