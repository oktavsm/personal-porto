name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: portfolio-production
      cancel-in-progress: false
    environment: production
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_PORT: ${{ secrets.EC2_PORT }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
      RELEASE_SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package release
        run: tar -czf release.tar.gz -C dist .

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail

          : "${EC2_HOST:?Missing EC2_HOST secret}"
          : "${EC2_USER:?Missing EC2_USER secret}"
          : "${EC2_SSH_KEY:?Missing EC2_SSH_KEY secret}"

          EC2_PORT="${EC2_PORT:-22}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -p "$EC2_PORT" -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Upload release archive
        shell: bash
        run: |
          set -euo pipefail

          EC2_PORT="${EC2_PORT:-22}"
          scp -i ~/.ssh/ec2_key -P "$EC2_PORT" release.tar.gz "$EC2_USER@$EC2_HOST:/tmp/teladan-porto-$RELEASE_SHA.tar.gz"

      - name: Activate release with blue-green switch
        shell: bash
        run: |
          set -euo pipefail

          EC2_PORT="${EC2_PORT:-22}"
          REMOTE_APP_DIR="${EC2_APP_DIR:-/var/www/teladan-porto}"

          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "APP_DIR='$REMOTE_APP_DIR' RELEASE_SHA='$RELEASE_SHA' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          APP_DIR="${APP_DIR:-/var/www/teladan-porto}"
          RELEASE_SHA="${RELEASE_SHA:?Missing RELEASE_SHA}"
          RELEASES_DIR="$APP_DIR/releases"
          RELEASE_DIR="$RELEASES_DIR/$RELEASE_SHA"
          ARCHIVE="/tmp/teladan-porto-$RELEASE_SHA.tar.gz"
          PREVIOUS_RELEASE=""

          if [ -L "$APP_DIR/current" ]; then
            PREVIOUS_RELEASE="$(readlink -f "$APP_DIR/current" || true)"
          fi

          mkdir -p "$RELEASE_DIR"
          tar -xzf "$ARCHIVE" -C "$RELEASE_DIR"
          rm -f "$ARCHIVE"

          if [ ! -f "$RELEASE_DIR/index.html" ]; then
            echo "Release is invalid: index.html not found."
            rm -rf "$RELEASE_DIR"
            exit 1
          fi

          ln -sfn "$RELEASE_DIR" "$APP_DIR/current.next"
          mv -Tf "$APP_DIR/current.next" "$APP_DIR/current"

          if command -v nginx >/dev/null 2>&1; then
            if sudo -n nginx -t; then
              sudo -n systemctl reload nginx || sudo -n nginx -s reload
            else
              echo "Nginx config test failed. Rolling back."
              if [ -n "$PREVIOUS_RELEASE" ] && [ -d "$PREVIOUS_RELEASE" ]; then
                ln -sfn "$PREVIOUS_RELEASE" "$APP_DIR/current"
                sudo -n nginx -t && (sudo -n systemctl reload nginx || sudo -n nginx -s reload)
              fi
              exit 1
            fi
          fi

          find "$RELEASES_DIR" -mindepth 1 -maxdepth 1 -type d | sort | head -n -5 | xargs -r rm -rf
          REMOTE_SCRIPT
