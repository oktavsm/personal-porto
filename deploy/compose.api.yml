services:
  postgres:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-teladan-porto-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 8

  api:
    image: ${API_IMAGE}
    container_name: ${API_CONTAINER_NAME:-teladan-porto-api}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      API_NODE_ENV: production
      API_HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      CORS_ORIGIN: ${CORS_ORIGIN}
      COOKIE_SECRET: ${COOKIE_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_DAYS: ${SESSION_DAYS:-7}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-25}
      PUBLIC_UPLOAD_BASE_URL: ${PUBLIC_UPLOAD_BASE_URL:-/uploads}
      ARTICLE_GENERATE_WEBHOOK_URL: ${ARTICLE_GENERATE_WEBHOOK_URL:-}
      ARTICLE_GENERATE_SECRET: ${ARTICLE_GENERATE_SECRET:-}
    ports:
      - "127.0.0.1:${API_PORT:-3000}:3000"
    volumes:
      - uploads-data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 20s

volumes:
  postgres-data:
  uploads-data:
