services:
  portfolio:
    image: ${PORTFOLIO_IMAGE}
    container_name: ${PORTFOLIO_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORTFOLIO_PORT}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
